[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #00AB66
#primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/Top]
width = 100%
height = 24pt
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

padding-left = 1
padding-right = 2

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = Source Code Pro:style=Bold
font-1 = Sauce Code Pro Nerd Font:style=Bold:size=14

modules-left = xworkspaces
modules-right = updates-arch redshift backlight pulseaudio xkeyboard popup-calendar

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[bar/Bottom]
width = 100%
height = 24pt
bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size=4pt

padding-left=2
padding-right=1

module-margin= 1

separator= |
separator-foreground = ${colors.disabled}

font-0 = Source Code Pro:style=bold
font-1 = Sauce Code Pro Nerd Font:style=bold:size=14

modules-left = battery
modules-right = memory cpu wlan eth network-traffic

enable-ipc = true

wm-restack = bspwm

[module/popup-calendar]
type = custom/script
exec = ~/.config/polybar/scripts/popup-calendar.sh
interval = 5
click-left = ~/.config/polybar/scripts/popup-calendar.sh --popup &

[module/spotify]
type = custom/script
interval = 1
format-prefix = "ÔĪė  "
format-prefix-foreground = ${colors.primary}
format = <label>
exec = python ~/.config/polybar/scripts/spotify_status.py -f '{artist}: {song}'
;control players (optional)
click-left = playerctl --player=spotifyd play-pause 
click-right = playerctl --player=spotifyd next 
click-middle = playerctl --player=spotifyd previous

[module/updates-arch]
type = custom/script
exec = ~/.config/polybar/scripts/updates-arch.sh
format = <label>
format-prefix = "Ô£ď "
format-prefix-foreground = ${colors.primary}
label = %output%
interval = 60
click-left = bspc rule -a \* -o state=floating && alacritty -e yay -Syyuu &:

[module/redshift]
type = custom/script
format-prefix = "ÔÉę "  
format-prefix-foreground = ${colors.primary}
exec = source ~/.config/polybar/scripts/env.sh && ~/.config/polybar/scripts/redshift.sh temperature 
click-left = source ~/.config/polybar/scripts/env.sh && ~/.config/polybar/scripts/redshift.sh toggle 
interval=0.5

[module/battery]
type=internal/battery

battery=BAT1
adapter=ACAD

format-full = %{F#00AB66}Ôēł %{F#C5C8C6}<label-full>

label-full = %percentage%%

format-charging = %{F#00AB66}<animation-charging> %{F#C5C8C6}<label-charging>

label-charging = %percentage%%

format-discharging = %{F#00AB66}<ramp-capacity> %{F#C5C8C6}<label-discharging>

label-discharging = %percentage%%

bar-capacity-width = 10

animation-charging-0 = ÔĖÖ
animation-charging-1 = ÔĖÜ
animation-charging-2 = ÔĖá
animation-charging-3 = ÔĖČ
animation-charging-4 = ÔĖĄ

animation-charging-framerate = 750

ramp-capacity-0 = ÔēĻ
ramp-capacity-1 = ÔēĽ
ramp-capacity-2 = ÔēĹ
ramp-capacity-3 = ÔēŅ
ramp-capacity-4 = Ôēł 

[module/backlight]
type = internal/backlight
card = intel_backlight

format = %{F#00AB66}<ramp>%{F#C5C8C6} <label>
label = %percentage%%

ramp-2 = Ôóü
ramp-1 = Ôóě
ramp-0 = ÔóĚ

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false

format-volume = %{F#00AB66}<ramp-volume>%{F#C5C8C6} <label-volume>

label-volume = %percentage%%

ramp-volume-0 = Ô©ĺ
ramp-volume-1 = Ô©Ņ
ramp-volume-2 = Ô©Ĺ

format-muted = %{F#00AB66}Ô™Ä <label-muted>
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "Ô°ö "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5

format-connected-prefix-foreground = ${colors.primary}
format-connected = <label-connected>
format-disconnected-prefix-foreground = ${colors.primary}
format-disconnected = <label-disconnected>
label-disconnected = disconnected
label-disconnected-foreground = ${colors.disabled}

[module/wlan]
inherit = network-base
interface-type = wireless

format-connected-prefix = "Ô™® "
label-connected = %essid% %local_ip%

format-disconnected-prefix = "Ô™® "

[module/eth]
inherit = network-base
interface-type = wired

format-connected-prefix = "ÔõŅ "
label-connected = %local_ip%

format-disconnected-prefix = "ÔõŅ "

[module/network-traffic]
type = custom/script
exec = ~/.config/polybar/scripts/network-traffic.sh
tail = true
label = %output%
label-minlen = 19

[module/date]
type = internal/date
interval = 1

date = %b %d, %H:%M
date-alt = %d-%m-%Y %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
